<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba integración Moclano</title>
</head>
<body>

<h2>Prueba integración Moclano</h2>

<button id="btn">
Abrir Moclano con datos precargados
</button>

<script>
document.getElementById("btn").addEventListener("click", () => {

  const w = window.open(
    "https://halicate.github.io/analisis-cuantitativo/",
    "_blank"
  );

  const makeSeries = (name, start, monthlyGrowth) => {
  const data = [];
  let value = start;

  for (let i = 0; i < 60; i++) {
    const d = new Date(2020, i, 1);

    value *= (1 + monthlyGrowth);

    data.push({
      date: d.toISOString().slice(0, 10),
      vl: Number(value.toFixed(2))
    });
  }

  return {
    label: name,
    data
  };
};

const payload = {
  type: "MOCLANO_ANALYSIS_SERIES",
  payload: {
    series: [
      makeSeries("Fondo A", 100, 0.008),
      makeSeries("Fondo B", 100, 0.005)
    ]
  }
};

  setTimeout(() => {
    w.postMessage(payload, "*");
  }, 2000);

});
</script>

</body>
</html>
