<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba integración Moclano</title>
</head>
<body>

<h2>Prueba integración Moclano</h2>

<button id="btn">
Abrir Moclano con datos precargados
</button>

<script>
document.getElementById("btn").addEventListener("click", () => {

  const w = window.open(
    "https://halicate.github.io/analisis-cuantitativo/",
    "_blank"
  );

  const payload = {
    type: "MOCLANO_ANALYSIS_SERIES",
    payload: {
      series: [
        {
          label: "Fondo A",
          data: [
            { date: "2024-01-01", vl: 100 },
            { date: "2024-02-01", vl: 101 },
            { date: "2024-03-01", vl: 103 },
            { date: "2024-04-01", vl: 104 },
            { date: "2024-05-01", vl: 106 },
            { date: "2024-06-01", vl: 108 },
            { date: "2024-07-01", vl: 107 },
            { date: "2024-08-01", vl: 110 },
            { date: "2024-09-01", vl: 112 },
            { date: "2024-10-01", vl: 115 },
            { date: "2024-11-01", vl: 117 },
            { date: "2024-12-01", vl: 120 }
          ]
        },
        {
          label: "Fondo B",
          data: [
            { date: "2024-01-01", vl: 100 },
            { date: "2024-02-01", vl: 99 },
            { date: "2024-03-01", vl: 101 },
            { date: "2024-04-01", vl: 103 },
            { date: "2024-05-01", vl: 102 },
            { date: "2024-06-01", vl: 105 },
            { date: "2024-07-01", vl: 107 },
            { date: "2024-08-01", vl: 109 },
            { date: "2024-09-01", vl: 108 },
            { date: "2024-10-01", vl: 110 },
            { date: "2024-11-01", vl: 113 },
            { date: "2024-12-01", vl: 116 }
          ]
        }
      ]
    }
  };

  setTimeout(() => {
    w.postMessage(payload, "*");
  }, 2000);

});
</script>

</body>
</html>
